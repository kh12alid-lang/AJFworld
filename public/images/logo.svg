<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5d2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e401c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)"/>
  
  <!-- AJF Text (Large) -->
  <text x="100" y="75" 
        font-family="Arial, sans-serif" 
        font-size="60" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle">AJF</text>
  
  <!-- world Text (Small) -->
  <text x="100" y="105" 
        font-family="Arial, sans-serif" 
        font-size="24" 
        fill="white" 
        text-anchor="middle">world</text>
  
  <!-- Shopping Cart -->
  <g transform="translate(70, 115)" fill="white">
    <!-- Cart Handle -->
    <path d="M0 15 L-8 5" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <!-- Cart Body -->
    <rect x="0" y="15" width="60" height="25" rx="3" fill="white"/>
    <!-- Left Wheel -->
    <circle cx="15" cy="48" r="7" fill="white"/>
    <!-- Right Wheel -->
    <circle cx="45" cy="48" r="7" fill="white"/>
  </g>
</svg>